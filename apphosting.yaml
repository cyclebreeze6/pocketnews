# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1
env:
  - variable: NODE_ENV
    value: production
  - variable: CRON_SECRET
    # IMPORTANT: Change this value in the Firebase Console Settings -> Secrets or Environment Variables if you want to override this.
    # When triggering the sync externally, include this header: Authorization: Bearer Z5b6zdd8uwS9cpfBNuuI6/msR+nC7xurKw2VnhbAkZA=
    value: "Z5b6zdd8uwS9cpfBNuuI6/msR+nC7xurKw2VnhbAkZA="

cron:
  - schedule: "every 20 minutes"
    uri: "/api/cron/sync-breaking-news"
    timeoutSeconds: 540
  - schedule: "every 1 hours"
    uri: "/api/cron/sync-all-channels"
    timeoutSeconds: 540
  - schedule: "30 * * * *"
    uri: "/api/cron/sync-remaining-channels"
    timeoutSeconds: 540
  - schedule: "every 2 hours"
    uri: "/api/cron/sync-shorts"
    timeoutSeconds: 540
