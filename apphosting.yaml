# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1
env:
  - variable: NODE_ENV
    value: production
  - variable: CRON_SECRET
    # This value should be set in the Firebase Console Secrets/Env Variables UI for production.
    # It acts as a password for your cron endpoints.
    value: "placeholder_change_in_console"

cron:
  - schedule: "every 20 minutes"
    uri: "/api/cron/sync-breaking-news"
    timeoutSeconds: 540
  - schedule: "every 1 hours"
    uri: "/api/cron/sync-all-channels"
    timeoutSeconds: 540
