# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1
env:
  - variable: NODE_ENV
    value: production
  - variable: CRON_SECRET
    # IMPORTANT: Change this value in the Firebase Console Settings -> Secrets or Environment Variables.
    # When triggering the sync externally, include this header: Authorization: Bearer <your_secret_here>
    value: "change_me_to_a_secure_token"

cron:
  - schedule: "every 20 minutes"
    uri: "/api/cron/sync-breaking-news"
    timeoutSeconds: 540
  - schedule: "every 1 hours"
    uri: "/api/cron/sync-all-channels"
    timeoutSeconds: 540
